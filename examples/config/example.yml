request:
  country: India
  year_from: 1951
  year_to: 2001
  map_col_from: subdistrict
  map_col_to: subdistrict
  anchor_cols: [state, district]
  id_col_from: unit_id
  id_col_to: unit_id
  extra_context_cols: []

data:
  mode: files
  from_path: examples/data/from_units.csv
  to_path: examples/data/to_units.csv
  aliases_path: examples/data/aliases.csv

llm:
  provider: mock
  model: gemini-2.5-pro
  gemini_api_key_env: GEMINI_API_KEY
  temperature: 0.0
  seed: 42

pipeline:
  batch_size: 25
  max_candidates: 15
  review_score_threshold: 0.6
  run_name: example_run

cache:
  enabled: true
  backend: sqlite
  path: llm_cache.sqlite

retry:
  max_attempts: 3
  base_delay_seconds: 1.0
  max_delay_seconds: 20.0
  jitter_seconds: 0.2

output:
  directory: outputs
  write_csv: true
  write_parquet: true
  write_jsonl: true
