name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,io]

      - name: Lint
        run: ruff check .

      - name: Test
        run: python -m pytest

      - name: Build
        run: python -m build

      - name: Wheel Smoke Test
        run: |
          python -m pip uninstall -y adminlineage
          python -m pip install dist/*.whl
          python -c "import adminlineage; print(adminlineage.__version__)"
          adminlineage --help
